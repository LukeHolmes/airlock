name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Job 1: TypeScript Compilation
  # =============================================================================
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript compilation check
        run: pnpm typecheck

      - name: Build packages
        run: |
          pnpm --filter @airlock/core build
          pnpm --filter @airlock/ui build

  # =============================================================================
  # Job 2: Docker Image Build Test
  # =============================================================================
  docker-build:
    name: Docker Sandbox Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/sandbox
          file: ./packages/sandbox/Dockerfile
          push: false
          tags: airlock/sandbox:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test image with security profile
        run: |
          echo "Testing Docker image with Airlock security profile..."
          
          # Run container with security hardening matching ContainerManager
          docker run -d --name airlock-test \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            -p 6901:6901 \
            airlock/sandbox:test
          
          # Wait for services to start
          echo "Waiting for container to initialize..."
          sleep 15
          
          # Check container is running
          if docker ps | grep -q airlock-test; then
            echo "✓ Container is running"
          else
            echo "✗ Container failed to start"
            docker logs airlock-test || true
            exit 1
          fi
          
          # Check health status if available
          HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' airlock-test 2>/dev/null || echo "N/A")
          echo "Health status: $HEALTH_STATUS"
          
          # Test network isolation (should fail)
          if docker exec airlock-test ping -c 1 8.8.8.8 2>/dev/null; then
            echo "⚠ Warning: Network may not be fully isolated"
          else
            echo "✓ Network isolation confirmed"
          fi
          
          # Cleanup
          echo "Cleaning up test container..."
          docker stop airlock-test || true
          docker rm airlock-test || true
          
          echo "✓ Docker security profile test completed"

  # =============================================================================
  # Job 3: Lint & Format Check
  # =============================================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm format:check

  # =============================================================================
  # Summary Job (Required for branch protection)
  # =============================================================================
  ci-summary:
    name: CI Summary
    needs: [typecheck, docker-build, lint]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "TypeScript check: ${{ needs.typecheck.result }}"
          echo "Docker build: ${{ needs.docker-build.result }}"
          echo "Lint check: ${{ needs.lint.result }}"
          
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "::error::TypeScript check failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "::error::Docker build failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::Lint check failed"
            exit 1
          fi
          
          echo "::notice::All CI checks passed!"
