name: Publish Sandbox Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to publish (without v prefix)'
        required: true
        default: '0.3.1'
      push_latest:
        description: 'Also tag the image as :latest'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sandbox-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: airlock-sandbox
  SANDBOX_CONTEXT: ./packages/sandbox

jobs:
  publish:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 45

    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            PUSH_LATEST="${{ inputs.push_latest }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            PUSH_LATEST=true
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Use semver like 0.3.1 or tag v0.3.1."
            exit 1
          fi

          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/${IMAGE_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "push_latest=$PUSH_LATEST" >> "$GITHUB_OUTPUT"
          echo "Publishing ${IMAGE}:${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.SANDBOX_CONTEXT }}
          file: ${{ env.SANDBOX_CONTEXT }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=airlock-sandbox
          cache-to: type=gha,mode=max,scope=airlock-sandbox

      - name: Push latest tag
        if: steps.meta.outputs.push_latest == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.image }}:latest" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"

  smoke:
    name: Smoke Test Published Image
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull published amd64 image
        run: |
          docker pull --platform linux/amd64 \
            "${{ needs.publish.outputs.image }}:${{ needs.publish.outputs.version }}"

      - name: Run sandbox smoke test
        env:
          AIRLOCK_SANDBOX_IMAGE: ${{ needs.publish.outputs.image }}:${{ needs.publish.outputs.version }}
        run: bash scripts/sandbox-smoke.sh
